server:
  host: "0.0.0.0"
  port: 8765

streaming_engine:
  provider: "sherpa-onnx"
  model_dir: "./models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20"
  num_threads: 2
  sample_rate: 16000
  endpoint:
    rule1_min_trailing_silence: 2.4
    rule2_min_trailing_silence: 1.2
    rule3_min_utterance_length: 20.0
  hotwords:
    enabled: false          # 设为 true 启用动态热词
    score: 1.5              # 热词加分权重
    max_active_paths: 4     # beam search 路径数
    max_words: 50           # 动态热词滑动窗口大小
    min_word_length: 2      # 最小词长（过滤单字）
    # hotwords_file: ""     # 可选：静态热词文件路径（每行一个词）

correction_engine:
  provider: "paraformer"
  model: "iic/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  device: "cpu"
  # hotword: "专业术语1 专业术语2"  # 空格分隔的热词，提升课程专有名词识别率

audio:
  sample_rate: 16000
  chunk_duration_ms: 60
  ring_buffer_seconds: 60

protocol:
  debounce_partial_ms: 30
