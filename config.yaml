server:
  host: "0.0.0.0"
  port: 8765

streaming_engine:
  provider: "sherpa-onnx"
  model_dir: "./models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20"
  num_threads: 2
  sample_rate: 16000
  endpoint:
    rule1_min_trailing_silence: 2.4     # 长停顿断句
    rule2_min_trailing_silence: 0.8     # 句间短停顿断句（课程场景调短）
    rule3_min_utterance_length: 8.0     # 连续说话最长强制断句（秒）
  hotwords:
    enabled: false          # 设为 true 启用动态热词
    score: 1.5              # 热词加分权重
    max_active_paths: 4     # beam search 路径数
    max_words: 50           # 动态热词滑动窗口大小
    min_word_length: 2      # 最小词长（过滤单字）
    # hotwords_file: ""     # 可选：静态热词文件路径（每行一个词）

correction_engine:
  provider: "sherpa-offline"
  model_dir: "./models/sherpa-onnx-paraformer-zh-2024-03-09"
  num_threads: 2
  # 备选 provider:
  # provider: "paraformer"    # FunASR Paraformer-Large (需要 torch + funasr，更慢但支持热词)
  # model: "iic/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  # provider: "sensevoice"    # FunASR SenseVoice-Small (多语言，较轻量)

audio:
  sample_rate: 16000
  chunk_duration_ms: 60
  ring_buffer_seconds: 60

protocol:
  debounce_partial_ms: 30
